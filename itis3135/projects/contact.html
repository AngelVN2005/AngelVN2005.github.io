<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wendy's Kitchen ~ Contact Us </title>
    <!-- Imports Style Sheet-->
    <link rel="stylesheet" href="../styles/wendyStyle.css">
    <!--Imports cloud thingy-->
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
</head>

<body>
    <div data-include="../components/wendysHeader.html"></div>

    <main>
    <section id="contact-page">
        <div class="page-heading">
            <h2>Get in Touch</h2>
        </div>

        <div class="contact-Grid">

            <!-- LEFT: INFO -->
            <div class="contact-info">
                <div class="contact-info-heading">
                    <h3>Contact Information</h3>
                </div>
                
                <p>8891 Craver Rd, Charlotte, NC 28223</p>
                <p>(123) 456-7890</p>
                <p>wendyskitchen@gmail.com</p>
            </div>

            <!-- RIGHT: FORM -->
            <div class="contact-form">

                <div class="contact-form-heading">
                    <h3>Send Us a Message</h3>
                </div>
                
                <form id="contact-form">
                    <div class="form-group">
                        <input type="text" name="name" placeholder="Your Name" required>
                    </div>

                    <div class="form-group">
                        <input type="email" name="email" placeholder="Your Email" required>
                    </div>

                    <div class="form-group">
                        <input type="text" name="subject" placeholder="Subject" required>
                    </div>

                    <div class="form-group">
                        <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
                    </div>

                    <button type="submit" class="btn-solid">Send Message</button>
                </form>
            </div>

        </div>
    </section>
</main>

    <div data-include="../components/wendysFooter.html"></div>

    <!--Imports Include functionality-->
    <script src="../scripts/HTMLInclude.min.js"></script>
    <!-- Imports Script page -->
    <script src="../scripts/wendyScript.js"></script>
</body>

</html>
