<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wendy's Kitchen ~ Cart </title>
    <!-- Imports Style Sheet-->
    <link rel="stylesheet" href="../styles/wendyStyle.css">
    <!--Imports cloud thingy-->
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
</head>

<body>
    <div data-include="../components/wendysHeader.html"></div>

    <main>
    <section id="cart-page">
        <div class="page-heading">
            <h2>Cart</h2>
        </div>

        <div id="cart-container">
            <!-- Items will be injected here -->
        </div>

        <div id="cart-summary">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-price">$0.00</span>
            </div>

            <div class="cart-actions">
                <button id="clear-cart" class="btn-outline">Clear Cart</button>
                <button id="checkout-btn" class="btn-solid">Proceed to Checkout</button>
            </div>
        </div>
    </section>
</main>

    <div data-include="../components/wendysFooter.html"></div>

    <!--Imports Include functionality-->
    <script src="../scripts/HTMLInclude.min.js"></script>
    <!-- Imports Script page -->
    <script src="../scripts/wendyScript.js"></script>
</body>

</html>
