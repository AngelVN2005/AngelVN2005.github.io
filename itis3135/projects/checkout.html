<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wendy's Kitchen ~ Check-Out </title>
    <!-- Imports Style Sheet-->
    <link rel="stylesheet" href="../styles/wendyStyle.css">
    <!--Imports cloud thingy-->
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
</head>

<body>
    <div data-include="../components/wendysHeader.html"></div>

    <main>
    <section id="checkout-page">
        <div class="page-heading">
            <h2>Check-Out</h2>
        </div>

        <div class="checkout-Grid">
            
            <!-- LEFT: FORM -->
            <form id="checkout-form">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="name" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="address" required>
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="phone" required>
                </div>

                <button type="submit" class="btn-solid">Place Order</button>
            </form>

            <!-- RIGHT: SUMMARY -->
            <div id="order-summary">
                <h3>Order Summary</h3>
                <div id="summary-items"></div>
                <div class="summary-total">
                    <span>Total:</span>
                    <span id="summary-total-price">$0.00</span>
                </div>
            </div>

        </div>
    </section>
</main>

    <div data-include="../components/wendysFooter.html"></div>

     <!--Imports Include functionality-->
    <script src="../scripts/HTMLInclude.min.js"></script>
    <!-- Imports Script page -->
    <script src="../scripts/wendyScript.js"></script>
</body>

</html>
